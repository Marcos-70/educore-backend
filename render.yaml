services:
  - type: web
    name: educore-backend
    runtime: java
    plan: free
    buildCommand: ./mvnw package -DskipTests -B
    startCommand: java -jar target/*.jar
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: educore-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: educore-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: educore-db
          property: password
      - key: JWT_SECRET
        sync: false
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: APP_CORS_ALLOWED_ORIGINS
        value: https://your-frontend.vercel.app

  - type: postgres
    name: educore-db
    plan: free
    databaseName: educore_db
